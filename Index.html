<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, doc, runTransaction, setDoc, getDoc, collection, addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROJECT.firebaseapp.com",
  projectId: "TU_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 IP
async function getIP() {
  let res = await fetch("https://ipapi.co/json/");
  return await res.json();
}

// 🔢 contador REAL
async function getVisitorNumber() {
  const ref = doc(db, "meta", "contador");

  return await runTransaction(db, async (transaction) => {
    const docSnap = await transaction.get(ref);

    let nuevoNumero = 1;

    if (docSnap.exists()) {
      nuevoNumero = docSnap.data().valor + 1;
    }

    transaction.set(ref, { valor: nuevoNumero });

    return nuevoNumero;
  });
}

// 💻 info
function getDevice() {
  return {
    userAgent: navigator.userAgent,
    idioma: navigator.language,
    resolucion: screen.width + "x" + screen.height
  };
}

// 🚀 inicio
let visitanteNumero = 0;

(async () => {
  visitanteNumero = await getVisitorNumber();

  document.body.innerHTML = `
    <h1>Eres el visitante #${visitanteNumero}</h1>
    <p>Ingresa tu apodo:</p>
    <input id="nick" placeholder="Ej: Hacker123">
    <br><br>
    <button onclick="guardar()">Continuar</button>
  `;
})();

// 💾 guardar
window.guardar = async function() {

  let nick = document.getElementById("nick").value || "Anónimo";

  document.body.innerHTML = "<h2>Escaneando dispositivo...</h2>";

  let ip = await getIP();
  let device = getDevice();

  let datos = {
    visitante: visitanteNumero,
    nick: nick,

    ip: ip.ip,
    ciudad: ip.city,
    region: ip.region,
    pais: ip.country_name,

    ...device,
    fecha: new Date().toISOString()
  };

  await addDoc(collection(db, "logs"), datos);

  document.body.innerHTML = `
    <h1>Registro completado</h1>
    <p>Bienvenido ${nick}</p>
    <p>ID: #${visitanteNumero}</p>
  `;
};

</script>
</head>

<body style="background:black;color:#00ff00;font-family:monospace;text-align:center;margin-top:50px;">
</body>
</html>
